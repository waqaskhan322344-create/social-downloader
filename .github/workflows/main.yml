name: Build Android App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    # ↑ Using Ubuntu 22.04 (has libtinfo5)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install cython buildozer
      
      - name: Install system dependencies (Ubuntu 22.04)
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          # Removed libtinfo5 - not needed on 22.04
      
      - name: Build APK
        run: |
          buildozer init
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.2.0,yt-dlp,android,pyjnius,requests,Pillow/' buildozer.spec
          sed -i 's/android.api = 30/android.api = 31/' buildozer.spec
          sed -i 's/# android.permissions = None/android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE/' buildozer.spec
          yes | buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SocialMediaDownloader
          path: bin/*.apk
