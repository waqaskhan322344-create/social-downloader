name: Build Android App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ↑ CHANGE THIS from ubuntu-20.04 to ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install cython buildozer
      
      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
      
      - name: Build APK
        run: |
          buildozer init
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy,yt-dlp,Pillow/' buildozer.spec
          sed -i 's/android.api = 30/android.api = 31/' buildozer.spec
          yes | buildozer android debug
      
      - uses: actions/upload-artifact@v4
        with:
          name: SocialMediaDownloader
          path: bin/*.apk
