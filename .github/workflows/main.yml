name: Build Android App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install Cython and buildozer
        run: |
          pip install --upgrade pip
          pip install cython buildozer
      
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
      
      - name: Build APK
        run: |
          buildozer init
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy,yt-dlp,Pillow/' buildozer.spec
          sed -i 's/android.api = 30/android.api = 31/' buildozer.spec
          sed -i 's/# android.permissions = None/android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE/' buildozer.spec
          yes | buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: SocialMediaDownloader
          path: bin/*.apk
